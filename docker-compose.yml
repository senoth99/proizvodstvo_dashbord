services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proizvodstvo-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    volumes:
      - ./.data:/app/.data

  caddy:
    image: caddy:2-alpine
    container_name: proizvodstvo-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-db.cashercollection.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@cashercollection.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
